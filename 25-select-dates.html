<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartOps · Select Dates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/tokens.css?v=3" />
  <link rel="stylesheet" href="styles/frame.css?v=3" />
  <style>
    .status-bar { background: var(--bg-surface); }
    .app-bar {
      background: var(--bg-surface);
      padding: 4px 16px 12px;
      border-bottom: 1px solid var(--border-subtle);
      position: relative; z-index: 2;
    }
    .app-bar .nav-row {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center; gap: 8px; min-height: 44px;
    }
    .icon-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 0; color: var(--text-primary);
      cursor: pointer; touch-action: manipulation;
    }
    .icon-btn svg { width: 22px; height: 22px; }
    .app-bar h1.title {
      margin: 0; text-align: center;
      font-size: 18px; font-weight: 700;
      letter-spacing: -0.01em; color: var(--text-primary); line-height: 1;
    }

    /* Legend (sticky at top) */
    .legend {
      background: var(--bg-surface);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 3;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .legend-item .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-item .dot.available { background: #16A34A; }
    .legend-item .dot.pending   { background: #F59E0B; }
    .legend-item .dot.off       { background: #94A3B8; }
    .legend-item .dot.flight    { background: #2563EB; }

    /* Calendar — multi-month scrollable */
    .calendar-wrap {
      padding: 16px 12px 100px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .month {
      background: var(--bg-surface);
      border-radius: 14px;
      box-shadow: var(--shadow-sm);
      padding: 16px 14px 14px;
    }
    .month h2 {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      letter-spacing: -0.005em;
    }
    .week-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      padding: 0 2px 8px;
    }
    .week-days span {
      text-align: center;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .day {
      aspect-ratio: 1 / 1;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-size: 13px;
      color: var(--text-primary);
      font-weight: 500;
      border-radius: 8px;
      background: transparent;
      border: 0;
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
      min-height: 38px;
      position: relative;
      transition: background 100ms;
    }
    .day:hover:not(.dis):not(.range):not(.start):not(.end) { background: #F1F5F9; }
    .day:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 1px; }
    .day.dis { color: #CBD5E1; cursor: default; }
    .day .day-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: transparent;
      margin-top: -1px;
    }
    .day.has-flight  .day-dot { background: #2563EB; }
    .day.has-pending .day-dot { background: #F59E0B; }
    .day.has-off     .day-dot { background: #94A3B8; }
    .day.has-avail   .day-dot { background: #16A34A; }
    .day.range {
      background: #FFFBEB;
      border-radius: 0;
      color: #92400E;
    }
    .day.start, .day.end {
      background: var(--brand-primary);
      color: var(--text-on-primary);
      font-weight: 700;
    }
    .day.start { border-radius: 8px 0 0 8px; }
    .day.end { border-radius: 0 8px 8px 0; }
    .day.range .day-dot,
    .day.start .day-dot,
    .day.end .day-dot { background: rgba(15,27,45,0.6); }

    /* Footer */
    .footer-bar {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      background: var(--bg-surface);
      padding: 14px 16px 28px;
      border-top: 1px solid var(--border-subtle);
    }
    .selected-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px 10px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .selected-info b { color: var(--text-primary); font-weight: 600; }
    .cta {
      width: 100%; height: 56px;
      border-radius: var(--r-md);
      border: 0;
      font-family: inherit;
      font-size: 15.5px; font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer; touch-action: manipulation;
      background: var(--brand-primary);
      color: var(--text-on-primary);
      box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.45);
      border: 1px solid rgba(0,0,0,0.06);
      transition: transform 150ms;
    }
    .cta:active { transform: translateY(1px); }
    .cta:focus-visible { outline: 2px solid #0F1B2D; outline-offset: 3px; }
  </style>
</head>
