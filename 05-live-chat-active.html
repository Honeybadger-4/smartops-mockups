<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartOps · Live Chat (Active)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/tokens.css?v=3" />
  <link rel="stylesheet" href="styles/frame.css?v=3" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <style>
    /* ---- Screen background ---- */
    .screen { background: #EEF2F7; }

    /* ---- Status + App bar ---- */
    .status-bar { background: var(--bg-surface); }
    .app-bar {
      background: var(--bg-surface);
      padding: 4px 16px 12px;
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
      z-index: 2;
    }
    .app-bar .nav-row {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 8px;
      min-height: 44px;
    }
    .icon-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 0;
      color: var(--text-primary);
      cursor: pointer;
      transition: background 150ms ease-out, transform 100ms ease-out;
    }
    .icon-btn:active { transform: scale(0.94); background: rgba(15,27,45,0.06); }
    .icon-btn:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 2px; }
    .icon-btn svg { width: 22px; height: 22px; }
    .app-bar .title-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .app-bar .title {
      text-align: center;
      font-size: 18px; font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      line-height: 1;
    }
    .app-bar .agent-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      color: var(--brand-success);
      font-weight: 500;
      line-height: 1;
    }
    .app-bar .agent-status::before {
      content: "";
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--brand-success);
      box-shadow: 0 0 0 3px rgba(22,163,74,0.18);
    }

    /* ---- Chat content ---- */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px 100px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Day separator — contrast: #475569 on solid white = 7.4:1 ✓ AAA */
    .day-sep {
      align-self: center;
      font-size: 12px;
      color: #475569;
      background: #fff;
      padding: 4px 12px;
      border-radius: 999px;
      margin: 4px 0 6px;
      font-weight: 600;
      box-shadow: 0 1px 2px rgba(15,27,45,.06);
    }

    /* Bubbles */
    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.4;
      letter-spacing: -0.005em;
      box-shadow: 0 1px 2px rgba(15,27,45,.08);
      display: inline-flex;
      align-items: flex-end;
      gap: 10px;
    }
    .bubble .time {
      font-size: 11px;
      flex-shrink: 0;
      font-weight: 500;
      margin-bottom: 1px;
    }

    /* User bubble — açık brand sarı/krem, koyu navy text */
    .bubble-user {
      align-self: flex-end;
      background: #FEF3C7;
      color: #0F1B2D;
      border-radius: 18px 18px 4px 18px;
    }
    .bubble-user .time { color: rgba(15,27,45,0.50); }

    /* Agent bubble — açık gök mavi, koyu navy text */
    .bubble-agent {
      align-self: flex-start;
      background: #E0F2FE;
      color: #0F1B2D;
      border-radius: 18px 18px 18px 4px;
    }
    .bubble-agent .time { color: rgba(15,27,45,0.50); }

    /* Agent label (for first agent message) */
    .agent-label {
      align-self: flex-start;
      font-size: 11px;
      font-weight: 600;
      color: var(--brand-info);
      padding: 0 4px 2px;
      letter-spacing: 0.02em;
    }


    /* ---- Input bar ---- */
    .input-bar {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      background: var(--bg-surface);
      padding: 10px 12px 22px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .add-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #F1F5F9;
      border: 0;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--text-secondary);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 150ms ease-out, transform 100ms ease-out;
    }
    .add-btn:active { transform: scale(0.94); background: #E2E8F0; }
    .add-btn:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 2px; }
    .add-btn svg { width: 20px; height: 20px; }
    .msg-input {
      flex: 1;
      height: 44px;
      border-radius: 999px;
      border: 1.5px solid var(--border-default);
      background: var(--bg-surface);
      padding: 0 16px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 150ms, box-shadow 150ms;
    }
    .msg-input:focus { border-color: var(--brand-primary); box-shadow: 0 0 0 3px rgba(255,176,32,0.18); }
    .msg-input::placeholder { color: var(--text-tertiary); }
    .send-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--brand-primary);
      color: var(--text-on-primary);
      border: 1px solid rgba(0,0,0,0.06);
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.45);
      transition: transform 100ms ease-out, filter 150ms ease-out;
    }
    .send-btn:active { transform: scale(0.94); filter: brightness(0.95); }
    .send-btn:focus-visible { outline: 2px solid #0F1B2D; outline-offset: 2px; }
    .send-btn svg { width: 18px; height: 18px; fill: currentColor; }
  </style>
</head>
<body>
  <div class="page-title">Live Chat · active</div>

  <div class="iphone">
    <div class="screen">
      <!-- Status bar -->
      <div class="status-bar">
        <span>9:41</span>
        <span class="right">
          <span class="icons">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="1" y="7" width="3" height="4" rx="0.5" fill="#0F1B2D"/><rect x="5.5" y="5" width="3" height="6" rx="0.5" fill="#0F1B2D"/><rect x="10" y="3" width="3" height="8" rx="0.5" fill="#0F1B2D"/><rect x="14.5" y="1" width="3" height="10" rx="0.5" fill="#0F1B2D"/></svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 11 A 7 7 0 0 1 1.5 6.5 M8 11 A 4 4 0 0 1 4.5 7.5 M8 11 A 1.5 1.5 0 0 1 7 9.5" stroke="#0F1B2D" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
            <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="1" width="22" height="10" rx="2.5" stroke="#0F1B2D" stroke-opacity="0.55" fill="none"/><rect x="2" y="2.5" width="19" height="7" rx="1.5" fill="#0F1B2D"/><rect x="23.5" y="4" width="1.5" height="4" rx="0.5" fill="#0F1B2D" opacity="0.55"/></svg>
          </span>
        </span>
      </div>

      <!-- App bar -->
      <div class="app-bar">
        <div class="nav-row">
          <button class="icon-btn" aria-label="Back"><svg width="22" height="22" viewBox="0 0 16 16" fill="none"><path d="M10 13.28L5.65333 8.93333C5.14 8.42 5.14 7.58 5.65333 7.06667L10 2.72" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <div class="title">Live Chat</div>
          <span></span>
        </div>
      </div>

      <!-- Chat -->
      <div class="chat">
        <div class="day-sep">Today</div>

        <div class="bubble bubble-user">
          Hello, lorem ipsum
          <span class="time">11:35</span>
        </div>

        <div class="agent-label">Agent · Mark</div>
        <div class="bubble bubble-agent">
          Hi! I'm Mark from SmartOps. How can I help you today?
          <span class="time">11:36</span>
        </div>

        <div class="bubble bubble-user">
          I have a delay issue with flight SAW → SAW
          <span class="time">11:37</span>
        </div>

        <div class="bubble bubble-agent">
          Got it — let me check the operational status for that flight right away.
          <span class="time">11:37</span>
        </div>
      </div>

      <!-- Input bar -->
      <div class="input-bar">
        <button class="add-btn" aria-label="Add"><svg width="20" height="20" viewBox="0 0 16 16" fill="none"><path d="M4 8H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8 12V4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        <input class="msg-input" type="text" placeholder="Write a message" />
        <button class="send-btn" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M12.0467 5.67333L6.34 2.82C2.50667 0.9 0.933333 2.47333 2.85333 6.30667L3.43333 7.46667C3.6 7.80667 3.6 8.2 3.43333 8.54L2.85333 9.69333C0.933333 13.5267 2.5 15.1 6.34 13.18L12.0467 10.3267C14.6067 9.04667 14.6067 6.95333 12.0467 5.67333ZM9.89333 8.5H6.29333C6.02 8.5 5.79333 8.27333 5.79333 8C5.79333 7.72667 6.02 7.5 6.29333 7.5H9.89333C10.1667 7.5 10.3933 7.72667 10.3933 8C10.3933 8.27333 10.1667 8.5 9.89333 8.5Z" fill="currentColor"/></svg>
        </button>
      </div>

      <div class="home-indicator on-light"></div>
    </div>
  </div>

  <script>window.addEventListener('DOMContentLoaded', () => lucide.createIcons());</script>
</body>
</html>
