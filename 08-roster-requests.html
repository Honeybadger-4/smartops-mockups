<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartOps · Roster Requests</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/tokens.css?v=3" />
  <link rel="stylesheet" href="styles/frame.css?v=3" />
  <style>
    /* ---- Status + App bar ---- */
    .status-bar { background: var(--bg-surface); }
    .app-bar {
      background: var(--bg-surface);
      padding: 4px 16px 12px;
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
      z-index: 2;
    }
    .app-bar .nav-row {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 8px;
      min-height: 44px;
    }
    .icon-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 0;
      color: var(--text-primary);
      cursor: pointer;
      touch-action: manipulation;
      transition: background 150ms ease-out, transform 100ms ease-out;
    }
    .icon-btn:active { background: rgba(15,27,45,0.06); transform: scale(0.94); }
    .icon-btn:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 2px; }
    .icon-btn svg { width: 22px; height: 22px; }
    .app-bar h1.title {
      margin: 0;
      text-align: center;
      font-size: 18px; font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      line-height: 1;
    }

    /* ---- Helper card — brand-tinted (subtle sarı) ---- */
    h2.helper-card {
      margin: 0;
      background: #FFFBEB;
      padding: 16px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: #78350F;
      border-bottom: 1px solid rgba(255,176,32,0.20);
    }

    /* ---- Scalable list (renkli sol şeritli, Home pattern'ı) ---- */
    .list {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .list-item {
      background: var(--bg-surface);
      border-radius: 10px;
      box-shadow: var(--shadow-sm);
      padding: 22px 20px;
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      cursor: pointer;
      border: 1.5px solid transparent;
      position: relative;
      overflow: hidden;
      font-family: inherit;
      touch-action: manipulation;
      transition: border-color 150ms ease-out, transform 100ms ease-out;
    }
    .list-item::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--stripe);
      border-radius: 4px 0 0 4px;
    }
    .list-item:active { transform: translateY(1px); border-color: var(--border-default); }
    .list-item:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 2px; }
    .list-item .label {
      flex: 1;
      font-size: 14.5px;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: -0.005em;
      line-height: 1.3;
      text-align: left;
    }
    .list-item .chev {
      color: var(--text-tertiary);
      flex-shrink: 0;
      width: 20px; height: 20px;
    }
    .list-item .chev svg { width: 100%; height: 100%; }

    /* row variants — Home ile birebir aynı palet */
    .list-item.blue   { --stripe: var(--stripe-blue); }
    .list-item.purple { --stripe: var(--stripe-purple); }
    .list-item.yellow { --stripe: var(--stripe-yellow); }
    .list-item.orange { --stripe: var(--stripe-orange); }
    .list-item.gray   { --stripe: var(--stripe-gray); }
  </style>
</head>
<body>
  <div class="page-title">Roster Requests · revize</div>

  <div class="iphone">
    <div class="screen">
      <!-- Status bar -->
      <div class="status-bar">
        <span>9:41</span>
        <span class="right">
          <span class="icons">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="1" y="7" width="3" height="4" rx="0.5" fill="#0F1B2D"/><rect x="5.5" y="5" width="3" height="6" rx="0.5" fill="#0F1B2D"/><rect x="10" y="3" width="3" height="8" rx="0.5" fill="#0F1B2D"/><rect x="14.5" y="1" width="3" height="10" rx="0.5" fill="#0F1B2D"/></svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 11 A 7 7 0 0 1 1.5 6.5 M8 11 A 4 4 0 0 1 4.5 7.5 M8 11 A 1.5 1.5 0 0 1 7 9.5" stroke="#0F1B2D" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
            <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="1" width="22" height="10" rx="2.5" stroke="#0F1B2D" stroke-opacity="0.55" fill="none"/><rect x="2" y="2.5" width="19" height="7" rx="1.5" fill="#0F1B2D"/><rect x="23.5" y="4" width="1.5" height="4" rx="0.5" fill="#0F1B2D" opacity="0.55"/></svg>
          </span>
        </span>
      </div>

      <!-- App bar -->
      <div class="app-bar">
        <div class="nav-row">
          <button class="icon-btn" aria-label="Back"><svg width="22" height="22" viewBox="0 0 16 16" fill="none"><path d="M10 13.28L5.65333 8.93333C5.14 8.42 5.14 7.58 5.65333 7.06667L10 2.72" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <h1 class="title">Roster Requests</h1>
          <span></span>
        </div>
      </div>

      <div class="content">
        <!-- Helper / question card -->
        <h2 class="helper-card">What would you like to report an issue about?</h2>

        <!-- Scalable list — kart sayısı esnek, otomatik scroll'lu -->
        <div class="list">
          <button class="list-item blue" type="button">
            <span class="label">Leave</span>
            <span class="chev" aria-hidden="true">
              <svg viewBox="0 0 16 16" fill="none"><path d="M6 13.28L10.34667 8.93333C10.86 8.42 10.86 7.58 10.34667 7.06667L6 2.72" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
          </button>
          <button class="list-item purple" type="button">
            <span class="label">Duty Change</span>
            <span class="chev" aria-hidden="true">
              <svg viewBox="0 0 16 16" fill="none"><path d="M6 13.28L10.34667 8.93333C10.86 8.42 10.86 7.58 10.34667 7.06667L6 2.72" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
          </button>
          <button class="list-item yellow" type="button">
            <span class="label">Efatur</span>
            <span class="chev" aria-hidden="true">
              <svg viewBox="0 0 16 16" fill="none"><path d="M6 13.28L10.34667 8.93333C10.86 8.42 10.86 7.58 10.34667 7.06667L6 2.72" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
          </button>
          <button class="list-item orange" type="button">
            <span class="label">Gendec</span>
            <span class="chev" aria-hidden="true">
              <svg viewBox="0 0 16 16" fill="none"><path d="M6 13.28L10.34667 8.93333C10.86 8.42 10.86 7.58 10.34667 7.06667L6 2.72" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
          </button>
        </div>
      </div>

      <div class="home-indicator on-light"></div>
    </div>
  </div>
</body>
</html>
