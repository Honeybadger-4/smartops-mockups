<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartOps · Previous Live Chats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/tokens.css?v=3" />
  <link rel="stylesheet" href="styles/frame.css?v=3" />
  <style>
    .screen { background: #EEF2F7; }

    /* Status + App bar */
    .status-bar { background: var(--bg-surface); }
    .app-bar {
      background: var(--bg-surface);
      padding: 4px 16px 12px;
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
      z-index: 2;
    }
    .app-bar .nav-row {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 8px;
      min-height: 44px;
    }
    .icon-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 0;
      color: var(--text-primary);
      cursor: pointer;
      touch-action: manipulation;
      transition: background 150ms ease-out, transform 100ms ease-out;
    }
    .icon-btn:active { background: rgba(15,27,45,0.06); transform: scale(0.94); }
    .icon-btn:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 2px; }
    .icon-btn svg { width: 22px; height: 22px; }
    .app-bar h1.title {
      margin: 0;
      text-align: center;
      font-size: 18px; font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      line-height: 1;
    }

    /* Search bar */
    .search-wrap {
      background: var(--bg-surface);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .search-field {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #F1F5F9;
      border-radius: 999px;
      padding: 10px 16px;
      min-height: 44px;
      transition: box-shadow 150ms ease-out;
    }
    .search-field:focus-within {
      box-shadow: 0 0 0 2px var(--brand-primary);
    }
    .search-field svg { width: 18px; height: 18px; color: var(--text-tertiary); flex-shrink: 0; }
    .search-input {
      flex: 1;
      border: 0;
      outline: none;
      background: transparent;
      font-family: inherit;
      font-size: 14px;
      color: var(--text-primary);
      touch-action: manipulation;
    }
    .search-input::placeholder { color: var(--text-tertiary); }

    /* Tabs (filter) */
    .tabs {
      display: flex;
      gap: 24px;
      padding: 14px 20px 12px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
    }
    .tab {
      font-family: inherit;
      background: transparent;
      border: 0;
      padding: 4px 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-tertiary);
      cursor: pointer;
      position: relative;
      touch-action: manipulation;
      min-height: 32px;
      transition: color 150ms ease-out;
    }
    .tab:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 4px; border-radius: 4px; }
    .tab.active {
      color: var(--text-primary);
    }
    .tab.active::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: -13px;
      height: 2px;
      background: var(--brand-primary);
      border-radius: 2px;
    }

    /* Chat list */
    .chat-list {
      padding: 10px 0 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-item {
      background: var(--bg-surface);
      padding: 14px 16px 14px 32px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      cursor: pointer;
      position: relative;
      width: 100%;
      border: 0;
      border-left: 4px solid transparent;
      font-family: inherit;
      text-align: left;
      touch-action: manipulation;
      transition: background 120ms ease-out;
    }
    .chat-item:active { background: rgba(15,27,45,0.03); }
    .chat-item:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: -2px; }
    /* unread state — soft sarı tinted + sarı sol şerit + nokta */
    .chat-item.unread {
      background: #FFFBEB;
      border-left-color: var(--brand-primary);
    }
    .chat-item.unread::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--brand-primary);
    }
    .chat-item .body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .chat-item .preview {
      font-size: 12.5px;
      line-height: 1.4;
      color: var(--text-secondary);
      display: flex;
      gap: 4px;
      align-items: baseline;
      min-width: 0;
      width: 100%;
    }
    .chat-item .preview .who {
      color: var(--text-tertiary);
      font-weight: 600;
      flex-shrink: 0;
    }
    .chat-item .preview .msg {
      color: var(--text-secondary);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chat-item .timestamp {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-tertiary);
      flex-shrink: 0;
      padding-top: 2px;
    }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1.4;
      width: max-content;
    }
    .badge.open {
      background: #15803D;
      color: #fff;
    }
    .badge.closed {
      background: #DC2626;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="page-title">Previous Live Chats · revize</div>

  <div class="iphone">
    <div class="screen">
      <!-- Status bar -->
      <div class="status-bar">
        <span>9:41</span>
        <span class="right">
          <span class="icons">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="1" y="7" width="3" height="4" rx="0.5" fill="#0F1B2D"/><rect x="5.5" y="5" width="3" height="6" rx="0.5" fill="#0F1B2D"/><rect x="10" y="3" width="3" height="8" rx="0.5" fill="#0F1B2D"/><rect x="14.5" y="1" width="3" height="10" rx="0.5" fill="#0F1B2D"/></svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 11 A 7 7 0 0 1 1.5 6.5 M8 11 A 4 4 0 0 1 4.5 7.5 M8 11 A 1.5 1.5 0 0 1 7 9.5" stroke="#0F1B2D" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
            <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="1" width="22" height="10" rx="2.5" stroke="#0F1B2D" stroke-opacity="0.55" fill="none"/><rect x="2" y="2.5" width="19" height="7" rx="1.5" fill="#0F1B2D"/><rect x="23.5" y="4" width="1.5" height="4" rx="0.5" fill="#0F1B2D" opacity="0.55"/></svg>
          </span>
        </span>
      </div>

      <!-- App bar -->
      <div class="app-bar">
        <div class="nav-row">
          <button class="icon-btn" aria-label="Back"><svg width="22" height="22" viewBox="0 0 16 16" fill="none"><path d="M10 13.28L5.65333 8.93333C5.14 8.42 5.14 7.58 5.65333 7.06667L10 2.72" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <h1 class="title">Previous Live Chats</h1>
          <span></span>
        </div>
      </div>

      <div class="content">
        <!-- Search -->
        <div class="search-wrap">
          <label class="search-field">
            <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <!-- vuesax/linear/search -->
              <circle cx="7.33" cy="7.33" r="5.83" stroke="currentColor" stroke-width="1.5"/>
              <path d="M14 14L12.67 12.67" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input class="search-input" type="search" placeholder="Search" aria-label="Search chats" />
          </label>
        </div>

        <!-- Tabs (filter) -->
        <div class="tabs" role="tablist" aria-label="Chat filter">
          <button class="tab active" role="tab" aria-selected="true">All</button>
          <button class="tab" role="tab" aria-selected="false">Unread</button>
        </div>

        <!-- Chat list -->
        <div class="chat-list">
          <button class="chat-item unread" type="button">
            <div class="body">
              <span class="badge open">Open</span>
              <div class="preview">
                <span class="who">Live Agent:</span>
                <span class="msg">lorem ipsum sit dolor amet sit dolor …</span>
              </div>
            </div>
            <span class="timestamp">7min ago</span>
          </button>

          <button class="chat-item unread" type="button">
            <div class="body">
              <span class="badge open">Open</span>
              <div class="preview">
                <span class="who">You:</span>
                <span class="msg">lorem ipsum sit dolor amet lorem ipsum sit dolor …</span>
              </div>
            </div>
            <span class="timestamp">7min ago</span>
          </button>

          <button class="chat-item" type="button">
            <div class="body">
              <span class="badge open">Open</span>
              <div class="preview">
                <span class="who">You:</span>
                <span class="msg">lorem ipsum sit dolor amet lorem ipsum sit dolor …</span>
              </div>
            </div>
            <span class="timestamp">7min ago</span>
          </button>

          <button class="chat-item" type="button">
            <div class="body">
              <span class="badge closed">Closed</span>
              <div class="preview">
                <span class="who">You:</span>
                <span class="msg">lorem ipsum sit dolor amet lorem ipsum sit dolor …</span>
              </div>
            </div>
            <span class="timestamp">7min ago</span>
          </button>
        </div>
      </div>

      <div class="home-indicator on-light"></div>
    </div>
  </div>
</body>
</html>
