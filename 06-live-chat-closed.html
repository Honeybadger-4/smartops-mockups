<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartOps · Live Chat (Closed)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/tokens.css?v=3" />
  <link rel="stylesheet" href="styles/frame.css?v=3" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <style>
    .screen { background: #EEF2F7; }

    /* Status + App bar */
    .status-bar { background: var(--bg-surface); }
    .app-bar {
      background: var(--bg-surface);
      padding: 4px 16px 12px;
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
      z-index: 2;
    }
    .app-bar .nav-row {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 8px;
      min-height: 44px;
    }
    .icon-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 0;
      color: var(--text-primary);
      cursor: pointer;
      transition: background 150ms ease-out, transform 100ms ease-out;
    }
    .icon-btn:active { transform: scale(0.94); background: rgba(15,27,45,0.06); }
    .icon-btn:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 2px; }
    .icon-btn svg { width: 22px; height: 22px; }
    .app-bar .title {
      text-align: center;
      font-size: 18px; font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      line-height: 1;
    }

    /* Chat */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .day-sep {
      align-self: center;
      font-size: 12px;
      color: #475569;
      background: #fff;
      padding: 4px 12px;
      border-radius: 999px;
      margin: 4px 0 6px;
      font-weight: 600;
      box-shadow: 0 1px 2px rgba(15,27,45,.06);
    }
    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.4;
      letter-spacing: -0.005em;
      box-shadow: 0 1px 2px rgba(15,27,45,.08);
      display: inline-flex;
      align-items: flex-end;
      gap: 10px;
    }
    .bubble .time {
      font-size: 11px;
      flex-shrink: 0;
      font-weight: 500;
      margin-bottom: 1px;
    }
    .bubble-user {
      align-self: flex-end;
      background: #FEF3C7;
      color: #0F1B2D;
      border-radius: 18px 18px 4px 18px;
    }
    .bubble-user .time { color: rgba(15,27,45,0.50); }
    .bubble-agent {
      align-self: flex-start;
      background: #E0F2FE;
      color: #0F1B2D;
      border-radius: 18px 18px 18px 4px;
    }
    .bubble-agent .time { color: rgba(15,27,45,0.50); }
    .agent-label {
      align-self: flex-start;
      font-size: 11px;
      font-weight: 600;
      color: var(--brand-info);
      padding: 0 4px 2px;
      letter-spacing: 0.02em;
    }


    /* ---- Ticket card ---- */
    .ticket-card {
      margin-top: 10px;
      background: var(--bg-surface);
      border-radius: var(--r-md);
      box-shadow: 0 1px 3px rgba(15,27,45,.06);
      overflow: hidden;
    }
    .ticket-row {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 44px;
    }
    .ticket-row + .ticket-row {
      border-top: 1px solid var(--border-subtle);
    }
    .ticket-row .label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .ticket-row .value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      letter-spacing: -0.005em;
    }
    .ticket-row.link a {
      font-size: 13px;
      color: var(--brand-info);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      word-break: break-all;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      transition: color 150ms;
      display: inline;
    }
    .ticket-row.link a:active { color: #1E3A8A; }
    .ticket-row.link .ext {
      display: inline-block;
      vertical-align: -2px;
      margin-left: 4px;
      color: var(--brand-info);
      width: 14px; height: 14px;
    }
    .ticket-row.link .ext svg { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="page-title">Live Chat · closed</div>

  <div class="iphone">
    <div class="screen">
      <!-- Status bar -->
      <div class="status-bar">
        <span>9:41</span>
        <span class="right">
          <span class="icons">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="1" y="7" width="3" height="4" rx="0.5" fill="#0F1B2D"/><rect x="5.5" y="5" width="3" height="6" rx="0.5" fill="#0F1B2D"/><rect x="10" y="3" width="3" height="8" rx="0.5" fill="#0F1B2D"/><rect x="14.5" y="1" width="3" height="10" rx="0.5" fill="#0F1B2D"/></svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 11 A 7 7 0 0 1 1.5 6.5 M8 11 A 4 4 0 0 1 4.5 7.5 M8 11 A 1.5 1.5 0 0 1 7 9.5" stroke="#0F1B2D" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
            <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="1" width="22" height="10" rx="2.5" stroke="#0F1B2D" stroke-opacity="0.55" fill="none"/><rect x="2" y="2.5" width="19" height="7" rx="1.5" fill="#0F1B2D"/><rect x="23.5" y="4" width="1.5" height="4" rx="0.5" fill="#0F1B2D" opacity="0.55"/></svg>
          </span>
        </span>
      </div>

      <!-- App bar -->
      <div class="app-bar">
        <div class="nav-row">
          <button class="icon-btn" aria-label="Back"><svg width="22" height="22" viewBox="0 0 16 16" fill="none"><path d="M10 13.28L5.65333 8.93333C5.14 8.42 5.14 7.58 5.65333 7.06667L10 2.72" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <div class="title">Live Chat</div>
          <span></span>
        </div>
      </div>

      <div class="chat">
        <div class="day-sep">Today</div>

        <div class="bubble bubble-user">
          Hello, lorem ipsum
          <span class="time">11:35</span>
        </div>

        <div class="agent-label">Agent · Mark</div>
        <div class="bubble bubble-agent">
          Hello 👋 Lorem ipsum dolor set amet.
          <span class="time">11:35</span>
        </div>

        <div class="bubble bubble-user">
          Thanks!
          <span class="time">11:35</span>
        </div>

        <!-- Ticket card -->
        <div class="ticket-card">
          <div class="ticket-row link">
            <div>
              <a href="https://fit.pegasusum.com/jira/browse/PSK-119943">https://fit.pegasusum.com/jira/browse/PSK-119943</a><span class="ext" aria-hidden="true"><!-- vuesax/linear/export --><svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11.0533 6.74667L14 9.69333L11.0533 12.64" stroke="currentColor" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.66667 9.69333H13.92" stroke="currentColor" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/><path d="M7.33333 14C4.38667 14 2 12 2 8C2 4 4.38667 2 7.33333 2" stroke="currentColor" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            </div>
          </div>
          <div class="ticket-row">
            <span class="label">Created Ticket Number</span>
            <span class="value">#324234</span>
          </div>
        </div>
      </div>

      <div class="home-indicator on-light"></div>
    </div>
  </div>

  <script>window.addEventListener('DOMContentLoaded', () => lucide.createIcons());</script>
</body>
</html>
