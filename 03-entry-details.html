<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartOps · Entry Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/tokens.css?v=3" />
  <link rel="stylesheet" href="styles/frame.css?v=3" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <style>
    /* ---- Status + App bar ---- */
    .status-bar { background: var(--bg-surface); }
    .app-bar {
      background: var(--bg-surface);
      padding: 4px 16px 16px;
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
      z-index: 2;
    }
    .app-bar .nav-row {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 8px;
      min-height: 44px;
    }
    .icon-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 0;
      color: var(--text-primary);
      cursor: pointer;
    }
    .icon-btn:active { transform: scale(0.94); background: rgba(15,27,45,0.06); }
    .icon-btn:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 2px; }
    .icon-btn svg { width: 22px; height: 22px; }
    .app-bar .title {
      text-align: center;
      font-size: 18px; font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }

    /* ---- Intro section ---- */
    .intro {
      background: var(--bg-surface);
      padding: 18px 24px 22px;
      text-align: center;
    }
    .intro h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 10px;
    }
    .intro p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      max-width: 300px;
      margin: 0 auto;
    }

    /* ---- Section card ---- */
    .section-card {
      background: var(--bg-surface);
      padding: 16px 24px;
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    /* ---- Detail card ---- */
    .detail-card {
      background: var(--bg-surface);
      padding: 16px 16px 20px;
      margin-top: 8px;
    }
    .detail-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 0 4px;
    }
    .detail-head .label {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .detail-head .counter {
      font-size: 12.5px;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }

    .textarea {
      width: 100%;
      background: #F1F5F9;
      border: 0;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text-primary);
      padding: 14px 16px;
      outline: none;
      resize: vertical;
      min-height: 120px;
      line-height: 1.5;
    }
    .textarea::placeholder {
      color: var(--text-tertiary);
    }

    /* ---- Footer CTA ---- */
    .footer-bar {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      background: var(--bg-surface);
      padding: 14px 16px 28px;
      border-top: 1px solid var(--border-subtle);
    }
    .cta {
      width: 100%; height: 56px;
      border-radius: var(--r-md);
      border: 0;
      font-family: inherit;
      font-size: 15.5px; font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: transform 150ms ease-out;
    }
    .cta:active { transform: translateY(1px); }
    .cta:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 3px; }
    .cta-primary {
      background: var(--brand-primary);
      color: var(--text-on-primary);
      box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.45);
      border: 1px solid rgba(0,0,0,0.06);
    }
    .cta-disabled {
      background: #E2E8F0;
      color: #94A3B8;
      cursor: not-allowed;
      box-shadow: none;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="page-title">Entry Details · revize</div>

  <div class="iphone">
    <div class="screen">
      <!-- Status bar -->
      <div class="status-bar">
        <span>9:41</span>
        <span class="right">
          <span class="icons">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="1" y="7" width="3" height="4" rx="0.5" fill="#0F1B2D"/><rect x="5.5" y="5" width="3" height="6" rx="0.5" fill="#0F1B2D"/><rect x="10" y="3" width="3" height="8" rx="0.5" fill="#0F1B2D"/><rect x="14.5" y="1" width="3" height="10" rx="0.5" fill="#0F1B2D"/></svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 11 A 7 7 0 0 1 1.5 6.5 M8 11 A 4 4 0 0 1 4.5 7.5 M8 11 A 1.5 1.5 0 0 1 7 9.5" stroke="#0F1B2D" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
            <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="1" width="22" height="10" rx="2.5" stroke="#0F1B2D" stroke-opacity="0.55" fill="none"/><rect x="2" y="2.5" width="19" height="7" rx="1.5" fill="#0F1B2D"/><rect x="23.5" y="4" width="1.5" height="4" rx="0.5" fill="#0F1B2D" opacity="0.55"/></svg>
          </span>
        </span>
      </div>

      <!-- App bar -->
      <div class="app-bar">
        <div class="nav-row">
          <button class="icon-btn" aria-label="Back"><svg width="22" height="22" viewBox="0 0 16 16" fill="none"><path d="M10 13.28L5.65333 8.93333C5.14 8.42 5.14 7.58 5.65333 7.06667L10 2.72" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <div class="title">Entry Details</div>
          <span></span>
        </div>
      </div>

      <div class="content">
        <!-- Intro -->
        <div class="intro">
          <h2>Tell us about your issue</h2>
          <p>Please provide a brief description of the issue you're facing.</p>
        </div>

        <!-- Description section -->
        <div class="section-card">Description lorem ipsum</div>

        <!-- Detail -->
        <div class="detail-card">
          <div class="detail-head">
            <span class="label">Detail</span>
            <span class="counter"><span id="char-count">0</span>/250</span>
          </div>
          <textarea class="textarea" id="detail-input" maxlength="250" placeholder="Please write details"></textarea>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer-bar">
        <button class="cta cta-disabled" id="cta-btn">Continue</button>
      </div>

      <div class="home-indicator on-light"></div>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      const ta = document.getElementById('detail-input');
      const cnt = document.getElementById('char-count');
      const btn = document.getElementById('cta-btn');
      ta.addEventListener('input', () => {
        cnt.textContent = ta.value.length;
        if (ta.value.trim().length > 0) {
          btn.classList.remove('cta-disabled');
          btn.classList.add('cta-primary');
        } else {
          btn.classList.add('cta-disabled');
          btn.classList.remove('cta-primary');
        }
      });
    });
  </script>
</body>
</html>
