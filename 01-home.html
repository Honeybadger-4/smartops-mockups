<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartOps · Home (revize)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/tokens.css?v=3" />
  <link rel="stylesheet" href="styles/frame.css?v=3" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <style>
    /* ---- Home-specific ---- */
    .header {
      background: var(--bg-header);
      color: var(--text-on-header);
      padding: 12px 24px 28px;
      border-radius: 0 0 28px 28px;
      box-shadow: var(--shadow-header);
      position: relative;
    }
    .header .brand {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 4px;
      margin-bottom: 12px;
    }
    .logo {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: inline-flex;
      align-items: center;
    }
    .logo .smart { color: #fff; }
    .logo .op { color: #fff; }
    .logo .s { color: var(--brand-accent); position: relative; }
    .logo .ring {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand-accent);
      margin-left: 2px;
      vertical-align: 2px;
      box-shadow: 0 0 0 2px rgba(233,78,27,0.25);
    }
    .header p {
      text-align: center;
      font-size: 12.5px;
      line-height: 1.55;
      color: var(--text-on-header-muted);
      max-width: 280px;
      margin: 0 auto;
    }

    /* ---- CTAs ---- */
    .cta-stack {
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .cta {
      height: 56px;
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 15.5px;
      font-weight: 600;
      letter-spacing: -0.01em;
      box-shadow: var(--shadow-sm);
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 150ms ease-out, box-shadow 150ms ease-out;
    }
    .cta:active { transform: translateY(1px); }
    .cta:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 3px; }
    .cta-primary {
      background: var(--brand-primary);
      color: var(--text-on-primary);
      border-color: rgba(0,0,0,0.06);
      box-shadow:
        var(--shadow-sm),
        inset 0 1px 0 rgba(255,255,255,0.45);
    }
    .cta-success {
      background: var(--brand-success);
      color: var(--text-on-success);
      box-shadow:
        var(--shadow-sm),
        inset 0 1px 0 rgba(255,255,255,0.18);
    }

    /* ---- List section ---- */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      padding: 16px 24px 8px;
    }
    .list {
      padding: 0 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .row {
      background: var(--bg-surface);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-sm);
      padding: 18px 16px 18px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 150ms ease-out, box-shadow 150ms ease-out;
    }
    .row:active { transform: translateY(1px); }
    .row:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 2px; }
    .row::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--stripe);
      border-radius: 4px 0 0 4px;
    }
    .row .icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--icon-bg);
      color: var(--icon-fg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .row .icon-wrap svg { width: 18px; height: 18px; }
    .row .label {
      flex: 1;
      font-size: 14.5px;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: -0.005em;
    }
    .row .meta {
      font-size: 11px;
      color: var(--text-tertiary);
      background: #F1F5F9;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 500;
    }
    .row .chev {
      color: var(--text-tertiary);
      flex-shrink: 0;
    }

    /* row variants */
    .row.blue   { --stripe: var(--stripe-blue);   --icon-bg: #DBEAFE; --icon-fg: #1E40AF; }
    .row.purple { --stripe: var(--stripe-purple); --icon-bg: #EDE9FE; --icon-fg: #6D28D9; }
    .row.yellow { --stripe: var(--stripe-yellow); --icon-bg: #FEF3C7; --icon-fg: #B45309; }
    .row.orange { --stripe: var(--stripe-orange); --icon-bg: #FFE4D6; --icon-fg: #C2410C; }
    .row.gray   { --stripe: var(--stripe-gray);   --icon-bg: #F1F5F9; --icon-fg: #475569; }
  </style>
</head>
<body>
  <div class="page-title">Home · revize</div>

  <div class="iphone">
    <div class="screen">
      <!-- Header (dark navy, brand-tinted, NOT pure black) -->
      <div class="header">
        <div class="status-bar on-dark">
          <span>9:41</span>
          <span class="right">
            <span class="icons">
              <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="1" y="7" width="3" height="4" rx="0.5" fill="#fff"/><rect x="5.5" y="5" width="3" height="6" rx="0.5" fill="#fff"/><rect x="10" y="3" width="3" height="8" rx="0.5" fill="#fff"/><rect x="14.5" y="1" width="3" height="10" rx="0.5" fill="#fff"/></svg>
              <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 11 A 7 7 0 0 1 1.5 6.5 M8 11 A 4 4 0 0 1 4.5 7.5 M8 11 A 1.5 1.5 0 0 1 7 9.5" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
              <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="1" width="22" height="10" rx="2.5" stroke="#fff" stroke-opacity="0.55" fill="none"/><rect x="2" y="2.5" width="19" height="7" rx="1.5" fill="#fff"/><rect x="23.5" y="4" width="1.5" height="4" rx="0.5" fill="#fff" opacity="0.55"/></svg>
            </span>
          </span>
        </div>
        <div class="brand">
          <span class="logo">
            <span class="smart">Smart</span><span class="op">Op</span><span class="s">s</span>
          </span>
        </div>
        <p>Access your support options below.<br/>Choose an option to view details or request help.</p>
      </div>

      <div class="content">
        <!-- Primary CTAs -->
        <div class="cta-stack">
          <button class="cta cta-primary">
            Request an assistance
          </button>
          <button class="cta cta-success">
            Live Chat (2-12 Hour' Flights)
          </button>
        </div>

        <!-- Secondary list -->
        <div class="section-title">Recent &amp; History</div>
        <div class="list">
          <div class="row blue">
            <span class="label">Previous Live Chats</span>
            <svg class="chev" width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M6 13.28L10.34667 8.93333C10.86 8.42 10.86 7.58 10.34667 7.06667L6 2.72" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="row purple">
            <span class="label">Previous Bot Chats</span>
            <svg class="chev" width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M6 13.28L10.34667 8.93333C10.86 8.42 10.86 7.58 10.34667 7.06667L6 2.72" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="row yellow">
            <span class="label">My Support Requests</span>
            <svg class="chev" width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M6 13.28L10.34667 8.93333C10.86 8.42 10.86 7.58 10.34667 7.06667L6 2.72" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="row orange">
            <span class="label">My Team Requests</span>
            <svg class="chev" width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M6 13.28L10.34667 8.93333C10.86 8.42 10.86 7.58 10.34667 7.06667L6 2.72" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="row gray">
            <span class="label">Lorem ipsum</span>
            <svg class="chev" width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M6 13.28L10.34667 8.93333C10.86 8.42 10.86 7.58 10.34667 7.06667L6 2.72" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
      </div>

      <div class="home-indicator on-light"></div>
    </div>
  </div>

  <script>window.addEventListener('DOMContentLoaded', () => lucide.createIcons());</script>
</body>
</html>
