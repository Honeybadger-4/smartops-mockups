<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartOps · Modal · Live Chat Confirm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/tokens.css?v=3" />
  <link rel="stylesheet" href="styles/frame.css?v=3" />
  <style>
    .status-bar { background: var(--bg-surface); }
    .app-bar {
      background: var(--bg-surface);
      padding: 4px 16px 16px;
      border-bottom: 1px solid var(--border-subtle);
      position: relative; z-index: 2;
    }
    .app-bar .nav-row {
      display: grid; grid-template-columns: 44px 1fr 44px;
      align-items: center; gap: 8px; min-height: 44px;
    }
    .icon-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 0; color: var(--text-primary);
    }
    .icon-btn svg { width: 22px; height: 22px; }
    .app-bar h1.title {
      margin: 0; text-align: center;
      font-size: 18px; font-weight: 700;
      letter-spacing: -0.01em; color: var(--text-primary); line-height: 1;
    }

    /* Behind: simple flight rows */
    .section-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #92400E; padding: 18px 24px 8px;
    }
    .flights {
      padding: 0 16px 8px; display: flex; flex-direction: column; gap: 8px;
    }
    .flight {
      background: var(--bg-surface);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-sm);
      padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      border: 1.5px solid transparent;
    }
    .flight .body {
      flex: 1; min-width: 0;
      display: flex; align-items: center;
      justify-content: space-between; gap: 14px;
    }
    .flight .route {
      display: flex; align-items: center; gap: 2px;
      font-size: 14.5px; font-weight: 600;
      color: var(--text-primary); line-height: 1;
    }
    .flight .route .arrow { color: var(--text-tertiary); font-weight: 400; }
    .flight .when { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .flight .date { font-size: 12px; color: var(--text-secondary); line-height: 1; }
    .flight .times {
      font-size: 11.5px; font-weight: 500; color: #2563EB;
      white-space: nowrap; line-height: 1;
    }
    .flight .zone { color: #2563EB; }
    .flight .sep { color: #2563EB; margin: 0 2px; }
    .check {
      width: 22px; height: 22px;
      border-radius: 7px;
      border: 1.5px solid var(--border-default);
      background: var(--bg-surface); flex-shrink: 0;
    }
    .flight.selected {
      background: #FFFBEB;
      border-color: var(--brand-primary);
    }
    .flight.selected .check {
      background: var(--brand-primary);
      border-color: var(--brand-primary);
    }

    /* Modal */
    .scrim {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15,27,45,0.45);
      display: flex; align-items: center; justify-content: center;
      padding: 16px; z-index: 100;
    }
    .modal {
      background: var(--bg-surface);
      border-radius: 16px;
      padding: 0;
      width: 100%; max-width: 360px;
      box-shadow: 0 4px 8px rgba(15,27,45,.10), 0 18px 40px rgba(15,27,45,.22);
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .modal h2 {
      margin: 0;
      padding: 18px 20px 16px;
      text-align: center;
      font-size: 16px; font-weight: 700;
      color: var(--text-primary); letter-spacing: -0.01em;
      border-bottom: 1px dashed var(--border-subtle);
    }
    .modal-illustration {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-illustration img {
      max-width: 260px;
      max-height: 170px;
      object-fit: contain;
      display: block;
    }
    .modal p {
      padding: 0 20px 16px;
      text-align: center;
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.5;
      border-bottom: 1px dashed var(--border-subtle);
    }
    .modal-actions {
      display: flex; flex-direction: column; gap: 8px;
      padding: 16px 20px 20px;
    }
    .modal-btn { width: 100%; min-height: 48px; border: 0; border-radius: 10px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; touch-action: manipulation;
      transition: transform 100ms;
    }
    .modal-btn:active { transform: translateY(1px); }
    .modal-btn:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 2px; }
    .modal-btn.primary {
      background: var(--brand-primary); color: var(--text-on-primary);
      box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.45);
      border: 1px solid rgba(0,0,0,0.06);
    }
    .modal-btn.secondary {
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1.5px solid var(--border-default);
    }
    .modal-btn.secondary:active { background: #F1F5F9; }
  </style>
</head>
<body>
  <div class="page-title">Modal · Live Chat Confirm · revize</div>
  <div class="iphone">
    <div class="screen">
      <div class="status-bar">
        <span>9:41</span>
        <span class="right">
          <span class="icons">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="1" y="7" width="3" height="4" rx="0.5" fill="#0F1B2D"/><rect x="5.5" y="5" width="3" height="6" rx="0.5" fill="#0F1B2D"/><rect x="10" y="3" width="3" height="8" rx="0.5" fill="#0F1B2D"/><rect x="14.5" y="1" width="3" height="10" rx="0.5" fill="#0F1B2D"/></svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 11 A 7 7 0 0 1 1.5 6.5 M8 11 A 4 4 0 0 1 4.5 7.5 M8 11 A 1.5 1.5 0 0 1 7 9.5" stroke="#0F1B2D" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
            <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="1" width="22" height="10" rx="2.5" stroke="#0F1B2D" stroke-opacity="0.55" fill="none"/><rect x="2" y="2.5" width="19" height="7" rx="1.5" fill="#0F1B2D"/><rect x="23.5" y="4" width="1.5" height="4" rx="0.5" fill="#0F1B2D" opacity="0.55"/></svg>
          </span>
        </span>
      </div>

      <div class="app-bar">
        <div class="nav-row">
          <button class="icon-btn"><svg width="22" height="22" viewBox="0 0 16 16" fill="none"><path d="M10 13.28L5.65333 8.93333C5.14 8.42 5.14 7.58 5.65333 7.06667L10 2.72" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <h1 class="title">Select Available Flight</h1>
          <span></span>
        </div>
      </div>

      <div class="content">
        <div class="section-label">Departing Soon (0–2 Hours)</div>
        <div class="flights">
          <div class="flight selected">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M17 0H7C2.6 0 0 2.6 0 7V17C0 21.4 2.6 24 7 24H17C21.4 24 24 21.4 24 17V7C24 2.6 21.4 0 17 0ZM19.8 13.4C19.8 14.1 19.3 14.5 18.6 14.2L14.6 12.5C14.1 12.3 13.7 12.5 13.7 13V15.3C13.7 15.5 13.9 15.7 14 15.9L16 17.9C16.2 18.1 16.3 18.5 16.2 18.7L15.8 19.9C15.6 20.4 15 20.6 14.6 20.4L12.6 18.7C12.3 18.4 11.8 18.4 11.5 18.7L9.4 20.4C9 20.6 8.4 20.4 8.2 19.9L7.8 18.7C7.7 18.5 7.8 18.0 8 17.8L10 15.9C10.2 15.7 10.3 15.5 10.3 15.3V13C10.3 12.5 9.9 12.3 9.5 12.5L5.4 14.2C4.8 14.5 4.2 14.1 4.2 13.4V12.3C4.2 11.7 4.7 11.1 5.2 10.8L9.9 8.8C10.1 8.7 10.3 8.5 10.3 8.2V5.8C10.3 4.9 10.9 4 11.6 3.6C11.9 3.5 12.2 3.5 12.4 3.6C13.2 4 13.8 4.9 13.8 5.8V8.2C13.8 8.5 13.9 8.7 14.1 8.8L18.8 10.8C19.4 11.1 19.8 11.7 19.8 12.3V13.4Z" fill="#068BEE"/></svg>
            <span class="body">
              <span class="route">SAW <span class="arrow">→</span> SAW</span>
              <span class="when">
                <span class="date">21 Oct 2023</span>
                <span class="times">12:45<span class="zone">(L)</span><span class="sep">/</span>19:10<span class="zone">(Z)</span></span>
              </span>
            </span>
            <span class="check"></span>
          </div>
        </div>
        <div class="section-label">Upcoming Flights (2–12 Hours)</div>
        <div class="flights">
          <div class="flight">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M17 0H7C2.6 0 0 2.6 0 7V17C0 21.4 2.6 24 7 24H17C21.4 24 24 21.4 24 17V7C24 2.6 21.4 0 17 0Z" fill="#068BEE"/></svg>
            <span class="body">
              <span class="route">SAW <span class="arrow">→</span> SAW</span>
              <span class="when">
                <span class="date">21 Oct 2023</span>
                <span class="times">12:45<span class="zone">(L)</span><span class="sep">/</span>19:10<span class="zone">(Z)</span></span>
              </span>
            </span>
            <span class="check"></span>
          </div>
        </div>
      </div>

      <div class="scrim" role="dialog" aria-modal="true" aria-labelledby="lc-title">
        <div class="modal">
          <h2 id="lc-title">Live Chat</h2>
          <div class="modal-illustration">
            <img src="assets/icons/illustration-info.svg" alt="" />
          </div>
          <p>Would you like to connect to the live chat?</p>
          <div class="modal-actions">
            <button class="modal-btn primary" type="button">Yes</button>
            <button class="modal-btn secondary" type="button">No</button>
          </div>
        </div>
      </div>

      <div class="home-indicator on-light"></div>
    </div>
  </div>
</body>
</html>
