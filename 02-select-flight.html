<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartOps · Select Available Flight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/tokens.css?v=3" />
  <link rel="stylesheet" href="styles/frame.css?v=3" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <style>
    /* ---- Status bar white (match app-bar) ---- */
    .status-bar {
      background: var(--bg-surface);
    }

    /* ---- Top app bar ---- */
    .app-bar {
      background: var(--bg-surface);
      padding: 4px 16px 16px;
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
      z-index: 2;
    }
    .app-bar .nav-row {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 8px;
      min-height: 44px;
    }
    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 0;
      color: var(--text-primary);
      cursor: pointer;
      transition: background 150ms ease-out;
    }
    .icon-btn:active { background: rgba(15,27,45,0.06); transform: scale(0.94); }
    .icon-btn:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 2px; }
    .icon-btn svg { width: 22px; height: 22px; }
    .app-bar .title {
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }
    .app-bar .subtitle {
      text-align: center;
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    /* ---- Section helper ---- */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      padding: 18px 24px 8px;
    }

    /* ---- Flight list ---- */
    .flights {
      padding: 0 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .flight {
      background: var(--bg-surface);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-sm);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color 150ms ease-out, background 150ms ease-out, transform 150ms ease-out;
    }
    .flight:active { transform: translateY(1px); }

    /* Saturated blue plane chip — mevcut design'taki gibi */
    .flight .plane {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: #2563EB;
      color: #FFFFFF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .flight .plane svg { width: 20px; height: 20px; }

    /* Body — yatay yapı: route solda, when sağda */
    .flight .body {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .flight .route {
      display: flex;
      align-items: center;
      gap: 2px;
      font-size: 15.5px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      flex-shrink: 0;
    }
    .flight .route {
      line-height: 1;
    }
    .flight .route .arrow {
      color: var(--text-tertiary);
      font-weight: 400;
      line-height: 1;
    }

    .flight .when {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      min-width: 0;
    }
    .flight .date {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 400;
      letter-spacing: -0.005em;
      line-height: 1;
    }
    .flight .times {
      font-size: 12.5px;
      font-weight: 500;
      color: #2563EB;
      letter-spacing: -0.005em;
      white-space: nowrap;
      line-height: 1;
    }
    .flight .zone {
      color: #2563EB;
    }
    .flight .sep {
      color: #2563EB;
      margin: 0 2px;
    }

    /* Checkbox */
    .check {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      border: 1.5px solid var(--border-default);
      background: var(--bg-surface);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 150ms ease-out, border-color 150ms ease-out;
      flex-shrink: 0;
    }
    .check svg {
      width: 13px;
      height: 13px;
      color: #fff;
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 150ms ease-out, transform 150ms ease-out;
    }

    /* Selected row */
    .flight.selected {
      background: #FFFBEB;
      border-color: var(--brand-primary);
      box-shadow:
        var(--shadow-sm),
        0 0 0 4px rgba(255,176,32,0.10);
    }
    .flight.selected::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--brand-primary);
    }
    .flight.selected .check {
      background: var(--brand-primary);
      border-color: var(--brand-primary);
    }
    .flight.selected .check svg {
      opacity: 1;
      transform: scale(1);
    }

    /* ---- Bottom CTA bar ---- */
    .footer-bar {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      background: var(--bg-surface);
      padding: 14px 16px 28px;
      border-top: 1px solid var(--border-subtle);
      box-shadow: 0 -4px 16px rgba(15,27,45,.04);
    }
    .cta {
      width: 100%;
      height: 56px;
      border-radius: var(--r-md);
      border: 0;
      font-family: inherit;
      font-size: 15.5px;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: transform 150ms ease-out;
    }
    .cta:active { transform: translateY(1px); }
    .cta:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 3px; }
    .cta-primary {
      background: var(--brand-primary);
      color: var(--text-on-primary);
      box-shadow:
        var(--shadow-sm),
        inset 0 1px 0 rgba(255,255,255,0.45);
      border: 1px solid rgba(0,0,0,0.06);
    }
    .cta-disabled {
      background: #E2E8F0;
      color: #94A3B8;
      cursor: not-allowed;
    }

    /* selection summary */
    .selection-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px 10px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .selection-summary .count {
      color: var(--text-primary);
      font-weight: 600;
    }
  </style>
